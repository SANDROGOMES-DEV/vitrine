<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Vitrine Pro | Shopee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4b0-dfVZeuTXK7ggA9dy1bQAgMphmCj8",
            authDomain: "vitrine-shopee.firebaseapp.com",
            databaseURL: "https://vitrine-shopee-default-rtdb.firebaseio.com",
            projectId: "vitrine-shopee",
            storageBucket: "vitrine-shopee.firebasestorage.app",
            messagingSenderId: "561348400105",
            appId: "1:561348400105:web:4f1713c2f46bbfff5ab178"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const produtosRef = ref(db, 'produtos'); 

        const 280320 = "897931f87968595997235222272e7960166299d63c46a6f1571f54804670c52a";
        
        async function hashSenha(s){
            const utf8=new TextEncoder().encode(s);
            const hashBuffer=await crypto.subtle.digest('SHA-256',utf8);
            const hashArray=Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
        }

        window.fazerLogin = async () => {
            const h = await hashSenha(document.getElementById('senhaAdmin').value);
            if(h === CHAVE_MESTRA){ 
                sessionStorage.setItem('auth_minhaloja','true'); 
                mostrarCadastro(); 
            }
            else alert("Acesso Negado!");
        };

        window.importarCSV = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    results.data.forEach(prod => {
                        if(prod.nome && prod.preco) {
                            push(produtosRef, {
                                nome: prod.nome, preco: prod.preco,
                                imagem: prod.imagem, link: prod.link || "#",
                                categoria: prod.categoria || "Geral"
                            });
                        }
                    });
                    alert("Produtos importados!");
                }
            });
        };

        update(ref(db, 'stats'), { visitas: increment(1) });
        onValue(ref(db, 'stats/visitas'), (s) => document.getElementById('count-num').innerText = s.val() || 0);
        
        onValue(produtosRef, (s) => {
            const data = s.val();
            window.produtosBD = data ? Object.entries(data).map(([id, info]) => ({id, ...info})) : [];
            renderizar(window.produtosBD);
        });

        window.salvarNoFirebase = function() {
            const dados = {
                nome: document.getElementById('cadNome').value,
                preco: document.getElementById('cadPreco').value,
                imagem: document.getElementById('cadImg').value,
                link: document.getElementById('cadLink').value,
                categoria: document.getElementById('cadCat').value
            };
            push(produtosRef, dados).then(() => {
                alert("Salvo!");
                document.getElementById('formCadastro').reset();
            });
        };
    </script>
</head>
<body class="bg-gray-50 pb-24 text-gray-800 font-sans">

    <header class="bg-orange-600 text-white shadow-xl sticky top-0 z-50 p-4">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">🛍️ Vitrine Pro</h1>
                <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">
                    <i class="fas fa-eye mr-1"></i> <span id="count-num">0</span> Visitas
                </p>
            </div>
            <div class="relative w-full md:w-1/2">
                <input type="text" id="inputBusca" onkeyup="filtrar()" placeholder="O que você procura?" 
                       class="w-full p-3 pl-10 rounded-2xl text-gray-800 outline-none border-none focus:ring-2 focus:ring-orange-300 shadow-inner">
                <i class="fas fa-search absolute left-3 top-4 text-gray-400"></i>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 mt-6 flex gap-2 overflow-x-auto no-scrollbar pb-2">
        <button onclick="filtrarCategoria('Tudo')" class="cat-btn bg-orange-600 text-white px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap shadow-md">Tudo</button>
        <button onclick="filtrarCategoria('Eletrónicos')" class="cat-btn bg-white border px-6 py-2 rounded-full text-xs font-bold text-gray-500 whitespace-nowrap hover:bg-orange-50 transition">Eletrónicos</button>
        <button onclick="filtrarCategoria('Moda')" class="cat-btn bg-white border px-6 py-2 rounded-full text-xs font-bold text-gray-500 whitespace-nowrap hover:bg-orange-50 transition">Moda</button>
        <button onclick="filtrarCategoria('Casa')" class="cat-btn bg-white border px-6 py-2 rounded-full text-xs font-bold text-gray-500 whitespace-nowrap hover:bg-orange-50 transition">Casa</button>
    </div>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-2 md:grid-cols-4 gap-4" id="vitrine"></main>

    <div id="modalAdmin" class="fixed inset-0 bg-black/90 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl max-h-[90vh] overflow-y-auto border-t-8 border-orange-500">
            <div id="areaLogin">
                <h2 class="text-2xl font-bold mb-6 text-center text-gray-800 font-mono">ADMIN LOGIN</h2>
                <input type="password" id="senhaAdmin" placeholder="Sua Senha" class="w-full p-4 border rounded-2xl mb-4 text-center outline-none focus:ring-2 focus:ring-orange-500">
                <button onclick="fazerLogin()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold uppercase shadow-lg active:scale-95 transition">Acessar Painel</button>
                <button onclick="fecharAdmin()" class="w-full mt-2 text-gray-400 text-sm">Fechar</button>
            </div>

            <div id="areaCadastro" class="hidden space-y-6 text-left">
                <div class="bg-orange-50 p-4 rounded-3xl border-2 border-dashed border-orange-200">
                    <label id="labelCSV" for="inputCSV" class="flex items-center justify-center bg-orange-600 text-white p-4 rounded-2xl font-bold cursor-pointer hover:bg-orange-700 transition text-xs uppercase">
                        <i class="fas fa-upload mr-2"></i> Importar Planilha CSV
                    </label>
                    <input type="file" id="inputCSV" accept=".csv" class="hidden" onchange="importarCSV(event)">
                </div>

                <form id="formCadastro" onsubmit="event.preventDefault(); salvarNoFirebase();" class="space-y-3">
                    <p class="text-[10px] font-black text-gray-400 uppercase text-center tracking-widest">Cadastro Manual</p>
                    <input type="text" id="cadNome" placeholder="Nome do Produto" required class="w-full p-3 border rounded-xl outline-none">
                    <input type="text" id="cadPreco" placeholder="Preço (R$)" required class="w-full p-3 border rounded-xl outline-none">
                    <input type="text" id="cadImg" placeholder="Link da Foto" required class="w-full p-3 border rounded-xl outline-none">
                    <input type="text" id="cadLink" placeholder="Link da Shopee" required class="w-full p-3 border rounded-xl outline-none">
                    <select id="cadCat" class="w-full p-3 border rounded-xl outline-none bg-white">
                        <option value="Eletrónicos">Eletrónicos</option>
                        <option value="Moda">Moda</option>
                        <option value="Casa">Casa</option>
                    </select>
                    <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg uppercase active:scale-95 transition">Salvar na Vitrine</button>
                </form>
                <button onclick="logoutAdmin()" class="w-full text-gray-400 text-[10px] font-bold uppercase">Sair</button>
            </div>
        </div>
    </div>

    <button onclick="abrirAdmin()" class="fixed bottom-6 left-6 bg-gray-900/50 text-white p-4 rounded-full shadow-lg backdrop-blur-sm"><i class="fas fa-cog"></i></button>
    <a href="https://wa.me/SEUNUMERO" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition border-4 border-white"><i class="fab fa-whatsapp text-3xl"></i></a>

    <script>
        function renderizar(lista) {
            const v = document.getElementById('vitrine');
            v.innerHTML = lista.length ? "" : "<p class='col-span-full text-center py-20 text-gray-400'>Nenhum produto encontrado...</p>";
            lista.forEach(p => {
                v.innerHTML += `
                    <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 p-3 flex flex-col group overflow-hidden">
                        <div class="overflow-hidden rounded-[1.5rem] relative">
                            <img src="${p.imagem}" class="w-full h-44 object-cover group-hover:scale-110 transition duration-500" onerror="this.src='https://via.placeholder.com/400'">
                        </div>
                        <h3 class="mt-3 text-sm font-bold text-gray-700 h-10 line-clamp-2 leading-tight">${p.nome}</h3>
                        <div class="mt-auto pt-3 border-t border-gray-50 mt-3">
                            <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">${p.categoria}</p>
                            <p class="text-xl font-black text-orange-600">${p.preco}</p>
                            <a href="${p.link}" target="_blank" class="mt-3 block bg-orange-500 text-white text-center py-3 rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-md hover:bg-orange-600 transition">Ver Oferta</a>
                        </div>
                    </div>`;
            });
        }

        function filtrar() {
            const t = document.getElementById('inputBusca').value.toLowerCase();
            renderizar(window.produtosBD.filter(p => p.nome.toLowerCase().includes(t)));
        }

        window.filtrarCategoria = (cat) => {
            // Atualiza visual dos botões
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.replace('bg-orange-600', 'bg-white');
                btn.classList.replace('text-white', 'text-gray-500');
            });
            event.target.classList.replace('bg-white', 'bg-orange-600');
            event.target.classList.replace('text-gray-500', 'text-white');

            if (cat === 'Tudo') renderizar(window.produtosBD);
            else renderizar(window.produtosBD.filter(p => p.categoria === cat));
        };

        window.abrirAdmin = () => { 
            document.getElementById('modalAdmin').classList.remove('hidden'); 
            if(sessionStorage.getItem('auth_minhaloja')) mostrarCadastro(); 
        };
        window.fecharAdmin = () => document.getElementById('modalAdmin').classList.add('hidden');
        function mostrarCadastro() { 
            document.getElementById('areaLogin').classList.add('hidden'); 
            document.getElementById('areaCadastro').classList.remove('hidden'); 
            document.getElementById('cadNome').focus();
        }
        window.logoutAdmin = () => { sessionStorage.removeItem('auth_minhaloja'); location.reload(); };
    </script>
</body>
</html>
