<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Vitrine Shopee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081840.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-20">

    <header class="bg-orange-600 p-6 text-white text-center shadow-lg sticky top-0 z-50">
        <h1 class="text-3xl font-bold">🛒 Super Vitrine</h1>
        <div class="mt-4 max-w-md mx-auto">
            <input type="text" id="inputBusca" onkeyup="filtrarProdutos()" placeholder="Pesquisar produto..." 
                   class="w-full p-2 rounded-lg text-gray-800 border-none focus:ring-2 focus:ring-orange-300 outline-none">
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div id="vitrine" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
    </main>

    <a href="https://wa.me/SEU_NUMERO" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl z-50">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script>
        const produtos = [
    {
        nome: "Ring Light Profissional com Tripé",
        preco: "R$ 45,90",
        imagem: "https://cf.shopee.com.br/file/link-da-foto-aqui", 
        link: "https://shope.ee/seu-link-afiliado-1",
        categoria: "Eletrónicos"
    },
    {
        nome: "Kit 12 Pincéis de Maquilhagem",
        preco: "R$ 29,00",
        imagem: "https://cf.shopee.com.br/file/link-da-foto-aqui",
        link: "https://shope.ee/seu-link-afiliado-2",
        categoria: "Beleza"
    }
    // Basta copiar e colar este bloco para cada novo produto!
];
        function carregarVitrine(lista) {
            const vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = ""; // Limpa a vitrine antes de carregar
            
            lista.forEach(p => {
                vitrine.innerHTML += `
                    <div class="bg-white p-3 rounded-xl shadow-md flex flex-col justify-between">
                        <img src="${p.imagem}" class="w-full h-40 object-cover rounded-lg">
                        <h3 class="mt-3 text-sm font-medium text-gray-800 h-10">${p.nome}</h3>
                        <p class="text-orange-600 font-black text-xl">${p.preco}</p>
                        <a href="${p.link}" target="_blank" class="mt-4 block bg-orange-500 text-white text-center py-2 rounded-lg text-xs font-bold uppercase">Comprar</a>
                    </div>`;
            });
        }

        // FUNÇÃO DE FILTRO
        function filtrarProdutos() {
            const termo = document.getElementById('inputBusca').value.toLowerCase();
            const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));
            carregarVitrine(filtrados);
        }

        carregarVitrine(produtos);
    </script>
</body>
</html>
