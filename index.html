<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Pro | Shopee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURAÇÃO DO TEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyC4b0-dfVZeuTXK7ggA9dy1bQAgMphmCj8",
            authDomain: "vitrine-shopee.firebaseapp.com",
            databaseURL: "https://vitrine-shopee-default-rtdb.firebaseio.com",
            projectId: "vitrine-shopee",
            storageBucket: "vitrine-shopee.firebasestorage.app",
            messagingSenderId: "561348400105",
            appId: "1:561348400105:web:4f1713c2f46bbfff5ab178",
            measurementId: "G-SHWL14TC6C"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CONTADOR DE VISITAS ---
        const visitasRef = ref(db, 'stats');
        update(visitasRef, { visitas: increment(1) });
        onValue(ref(db, 'stats/visitas'), (snap) => {
            document.getElementById('count-num').innerText = snap.val() || 0;
        });

        // --- CARREGAR PRODUTOS ---
        const produtosRef = ref(db, 'produtos');
        onValue(produtosRef, (snapshot) => {
            const data = snapshot.val();
            window.produtosBD = data ? Object.entries(data).map(([id, info]) => ({id, ...info})) : [];
            renderizar(window.produtosBD);
        });

        // --- FUNÇÃO PARA O ADMIN SALVAR ---
        window.salvarNoFirebase = function() {
            const novoProd = {
                nome: document.getElementById('cadNome').value,
                preco: document.getElementById('cadPreco').value,
                imagem: document.getElementById('cadImg').value,
                link: document.getElementById('cadLink').value,
                categoria: document.getElementById('cadCat').value
            };
            
            push(produtosRef, novoProd).then(() => {
                alert("Produto cadastrado com sucesso!");
                fecharAdmin();
                document.getElementById('formCadastro').reset();
            });
        };
    </script>
</head>
<body class="bg-gray-50 pb-24 text-gray-800 font-sans">

    <header class="bg-orange-600 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto p-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-white">🛍️ VITRINE VIP</h1>
                <p class="text-[10px] uppercase font-bold opacity-90">
                    <i class="fas fa-eye mr-1"></i> <span id="count-num">0</span> visitas ao site
                </p>
            </div>
            <div class="relative w-full md:w-1/2">
                <input type="text" id="inputBusca" onkeyup="filtrar()" placeholder="O que procuras hoje?" 
                       class="w-full p-3 pl-10 rounded-2xl text-gray-800 outline-none shadow-inner border-none focus:ring-2 focus:ring-orange-300 transition-all">
                <i class="fas fa-search absolute left-3 top-4 text-gray-400"></i>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 mt-6 flex gap-2 overflow-x-auto no-scrollbar pb-2">
        <button onclick="filtrarCategoria('Tudo')" class="bg-orange-600 text-white px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap shadow-md">Tudo</button>
        <button onclick="filtrarCategoria('Eletrónicos')" class="bg-white border px-5 py-2 rounded-full text-xs font-bold text-gray-600 whitespace-nowrap hover:bg-orange-50 transition">Eletrónicos</button>
        <button onclick="filtrarCategoria('Moda')" class="bg-white border px-5 py-2 rounded-full text-xs font-bold text-gray-600 whitespace-nowrap hover:bg-orange-50 transition">Moda</button>
        <button onclick="filtrarCategoria('Casa')" class="bg-white border px-5 py-2 rounded-full text-xs font-bold text-gray-600 whitespace-nowrap hover:bg-orange-50 transition">Casa</button>
    </div>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-2 md:grid-cols-4 gap-4" id="vitrine">
        </main>

    <div id="modalAdmin" class="fixed inset-0 bg-black/90 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <div id="areaLogin">
                <h2 class="text-2xl font-bold mb-6 text-center">🔐 Painel Admin</h2>
                <input type="password" id="senhaAdmin" placeholder="Introduza a sua senha" class="w-full p-4 border rounded-2xl mb-4 text-lg text-center bg-gray-50 focus:ring-2 focus:ring-orange-500 outline-none">
                <button onclick="fazerLogin()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-orange-700 transition-all active:scale-95">ACESSAR</button>
                <button onclick="fecharAdmin()" class="w-full mt-4 text-gray-400 text-sm">Fechar Janela</button>
            </div>
            <div id="areaCadastro" class="hidden">
                <form id="formCadastro" class="space-y-4" onsubmit="event.preventDefault(); salvarNoFirebase();">
                    <h2 class="text-xl font-bold text-orange-600 mb-4 border-b pb-2">Cadastrar Oferta</h2>
                    <input type="text" id="cadNome" placeholder="Nome do Produto" required class="w-full p-3 border rounded-xl bg-gray-50">
                    <input type="text" id="cadPreco" placeholder="Preço (ex: R$ 49,90)" required class="w-full p-3 border rounded-xl bg-gray-50">
                    <input type="text" id="cadImg" placeholder="Link da Foto" required class="w-full p-3 border rounded-xl bg-gray-50">
                    <input type="text" id="cadLink" placeholder="Link Afiliado Shopee" required class="w-full p-3 border rounded-xl bg-gray-50">
                    <select id="cadCat" class="w-full p-3 border rounded-xl bg-gray-50">
                        <option value="Eletrónicos">Eletrónicos</option>
                        <option value="Moda">Moda</option>
                        <option value="Casa">Casa</option>
                    </select>
                    <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-green-700 transition-all active:scale-95">SALVAR NA NUVEM</button>
                </form>
                <button onclick="fecharAdmin()" class="w-full mt-6 text-gray-400 text-sm">Sair do Painel</button>
            </div>
        </div>
    </div>

    <button onclick="abrirAdmin()" class="fixed bottom-6 left-6 bg-gray-900/50 text-white p-4 rounded-full shadow-lg backdrop-blur-sm hover:bg-gray-900 transition-all">
        <i class="fas fa-cog"></i>
    </button>
    
    <a href="https://wa.me/SEU_NUMERO_AQUI" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script>
        const SENHA_MESTRA = "280320";

        function renderizar(lista) {
            const v = document.getElementById('vitrine');
            v.innerHTML = lista.length ? "" : "<div class='col-span-full text-center py-20 text-gray-400'><i class='fas fa-box-open text-4xl mb-2'></i><p>Nenhuma oferta encontrada.</p></div>";
            
            lista.forEach(p => {
                v.innerHTML += `
                    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-3 flex flex-col hover:shadow-xl transition-all duration-300 group">
                        <div class="relative overflow-hidden rounded-2xl">
                            <img src="${p.imagem}" class="w-full h-44 object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/400?text=Produto'">
                        </div>
                        <h3 class="mt-3 text-sm font-bold text-gray-700 h-10 line-clamp-2 leading-tight">${p.nome}</h3>
                        <div class="mt-auto pt-3">
                            <p class="text-xs text-gray-400 font-bold uppercase tracking-tighter">${p.categoria}</p>
                            <p class="text-xl font-black text-orange-600">${p.preco}</p>
                            <a href="${p.link}" target="_blank" class="mt-3 block bg-orange-500 text-white text-center py-3 rounded-2xl font-bold uppercase text-[10px] tracking-widest active:scale-95 transition-all shadow-md shadow-orange-100 hover:bg-orange-600">Resgatar Oferta</a>
                        </div>
                    </div>`;
            });
        }

        function filtrar() {
            const t = document.getElementById('inputBusca').value.toLowerCase();
            renderizar(window.produtosBD.filter(p => p.nome.toLowerCase().includes(t)));
        }

        function filtrarCategoria(c) {
            if (c === 'Tudo') renderizar(window.produtosBD);
            else renderizar(window.produtosBD.filter(p => p.categoria === c));
        }

        window.abrirAdmin = () => document.getElementById('modalAdmin').classList.remove('hidden');
        window.fecharAdmin = () => {
            document.getElementById('modalAdmin').classList.add('hidden');
            document.getElementById('areaLogin').classList.remove('hidden');
            document.getElementById('areaCadastro').classList.add('hidden');
        };
        window.fazerLogin = () => {
            if(document.getElementById('senhaAdmin').value === SENHA_MESTRA) {
                document.getElementById('areaLogin').classList.add('hidden');
                document.getElementById('areaCadastro').classList.remove('hidden');
            } else { alert("Senha Incorreta!"); }
        };
    </script>
</body>
</html>
