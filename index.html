<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Vitrine Shopee | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <header class="bg-orange-600 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto p-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="text-center md:text-left">
                    <h1 class="text-2xl font-black">🛍️ MINHA VITRINE</h1>
                    <p class="text-xs opacity-80 uppercase font-bold text-white">Achadinhos Shopee</p>
                </div>
                <div class="relative w-full md:w-1/2">
                    <input type="text" id="inputBusca" onkeyup="filtrarProdutos()" placeholder="O que procuras?" 
                           class="w-full p-3 pl-10 rounded-xl text-gray-800 outline-none">
                    <i class="fas fa-search absolute left-3 top-4 text-gray-400"></i>
                </div>
            </div>
            <div class="flex gap-2 mt-4 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="filtrarCategoria('Tudo')" class="bg-white/20 px-4 py-1.5 rounded-full text-xs font-bold transition">Tudo</button>
                <button onclick="filtrarCategoria('Eletrónicos')" class="bg-white/20 px-4 py-1.5 rounded-full text-xs font-bold transition">Eletrónicos</button>
                <button onclick="filtrarCategoria('Moda')" class="bg-white/20 px-4 py-1.5 rounded-full text-xs font-bold transition">Moda</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div id="vitrine" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <p class="col-span-full text-center py-10">Carregando produtos...</p>
        </div>
    </main>

    <div id="modalAdmin" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl">
            <div id="areaLogin">
                <h2 class="text-xl font-bold mb-4">Acesso Admin</h2>
                <input type="password" id="senhaAdmin" placeholder="Senha" class="w-full p-3 border rounded-xl mb-4">
                <button onclick="fazerLogin()" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold">ENTRAR</button>
                <button onclick="fecharAdmin()" class="w-full mt-2 text-gray-400">Fechar</button>
            </div>
            <div id="areaCadastro" class="hidden space-y-3">
                <h2 class="text-xl font-bold text-orange-600">Novo Produto</h2>
                <input type="text" id="cadNome" placeholder="Nome" class="w-full p-2 border rounded">
                <input type="text" id="cadPreco" placeholder="Preço (R$)" class="w-full p-2 border rounded">
                <input type="text" id="cadImg" placeholder="img/nome.jpg" class="w-full p-2 border rounded">
                <input type="text" id="cadLink" placeholder="Link Shopee" class="w-full p-2 border rounded">
                <select id="cadCat" class="w-full p-2 border rounded">
                    <option value="Eletrónicos">Eletrónicos</option>
                    <option value="Moda">Moda</option>
                </select>
                <button onclick="gerarCodigo()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">GERAR CÓDIGO</button>
                <div id="resultadoJson" class="hidden mt-4">
                    <textarea id="outputJson" readonly class="w-full h-24 p-2 bg-gray-100 text-[10px] border rounded"></textarea>
                    <p class="text-[9px] text-red-500 mt-1">Cole este código no fim do produtos.json (antes do último ] )</p>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 left-6 flex flex-col gap-3">
        <button onclick="abrirLogin()" class="bg-gray-800 text-white p-3 rounded-full shadow-lg opacity-50 hover:opacity-100"><i class="fas fa-lock"></i></button>
    </div>
    <a href="https://wa.me/SEU_NUMERO" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl"><i class="fab fa-whatsapp text-3xl"></i></a>

    <script>
        let produtosBD = [];
        const SENHA_MESTRA = "1234"; // Mude sua senha aqui!

        async function carregarDados() {
            try {
                const res = await fetch('produtos.json');
                produtosBD = await res.json();
                carregarVitrine(produtosBD);
            } catch (e) { document.getElementById('vitrine').innerHTML = "Erro ao carregar JSON."; }
        }

        function carregarVitrine(lista) {
            const v = document.getElementById('vitrine');
            v.innerHTML = "";
            lista.forEach(p => {
                v.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border p-3 flex flex-col">
                        <img src="${p.imagem}" class="w-full h-40 object-cover rounded-lg" onerror="this.src='https://via.placeholder.com/400'">
                        <h3 class="mt-2 text-sm font-semibold h-10 line-clamp-2">${p.nome}</h3>
                        <p class="text-lg font-black text-orange-600">${p.preco}</p>
                        <a href="${p.link}" target="_blank" class="mt-2 block bg-orange-500 text-white text-center py-2 rounded-lg text-xs font-bold uppercase">Ver Oferta</a>
                    </div>`;
            });
        }

        function filtrarProdutos() {
            const t = document.getElementById('inputBusca').value.toLowerCase();
            carregarVitrine(produtosBD.filter(p => p.nome.toLowerCase().includes(t)));
        }

        function filtrarCategoria(c) {
            if (c === 'Tudo') carregarVitrine(produtosBD);
            else carregarVitrine(produtosBD.filter(p => p.categoria === c));
        }

        // Funções Admin
        function abrirLogin() { document.getElementById('modalAdmin').classList.remove('hidden'); }
        function fecharAdmin() { document.getElementById('modalAdmin').classList.add('hidden'); }
        function fazerLogin() {
            if (document.getElementById('senhaAdmin').value === SENHA_MESTRA) {
                document.getElementById('areaLogin').classList.add('hidden');
                document.getElementById('areaCadastro').classList.remove('hidden');
            } else { alert("Senha errada!"); }
        }

        function gerarCodigo() {
            const prod = {
                nome: document.getElementById('cadNome').value,
                preco: document.getElementById('cadPreco').value,
                imagem: document.getElementById('cadImg').value,
                link: document.getElementById('cadLink').value,
                categoria: document.getElementById('cadCat').value
            };
            document.getElementById('outputJson').value = ",\n" + JSON.stringify(prod, null, 4);
            document.getElementById('resultadoJson').classList.remove('hidden');
        }

        carregarDados();
    </script>
</body>
</html>
