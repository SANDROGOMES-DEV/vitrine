<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Vitrine Shopee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-20">

    <header class="bg-orange-600 p-6 text-white text-center shadow-lg sticky top-0 z-50">
        <h1 class="text-3xl font-bold">🛒 Super Vitrine</h1>
        <p class="text-sm opacity-90">As melhores achadinhas da Shopee num só lugar</p>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div id="vitrine" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
    </main>

    <a href="https://wa.me/351912345678" target="_blank" 
       class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:bg-green-600 transition-transform hover:scale-110 z-50">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script>
        // 1. LISTA DE PRODUTOS (Aqui é onde geres a tua loja)
        const produtos = [
            {
                nome: "Fone Bluetooth Pro",
                preco: "R$ 89,90",
                imagem: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300",
                link: "https://shopee.com.br/exemplo1"
            },
            {
                nome: "Smartwatch Série 9",
                preco: "R$ 150,00",
                imagem: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300",
                link: "https://shopee.com.br/exemplo2"
            },
            {
                nome: "Mochila Impermeável",
                preco: "R$ 55,20",
                imagem: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=300",
                link: "https://shopee.com.br/exemplo3"
            }
        ];

        // 2. FUNÇÃO PARA RENDERIZAR OS PRODUTOS
        function carregarVitrine() {
            const vitrine = document.getElementById('vitrine');
            
            produtos.forEach(produto => {
                const cartao = `
                    <div class="bg-white p-3 rounded-xl shadow-md flex flex-col justify-between">
                        <div>
                            <img src="${produto.imagem}" alt="${produto.nome}" class="w-full h-40 object-cover rounded-lg">
                            <h3 class="mt-3 text-sm font-medium text-gray-800 line-clamp-2 h-10">${produto.nome}</h3>
                            <p class="text-orange-600 font-black text-xl mt-1">${produto.preco}</p>
                        </div>
                        <a href="${produto.link}" target="_blank" 
                           class="mt-4 block bg-orange-500 text-white text-center py-2.5 rounded-lg text-xs font-bold uppercase tracking-wider hover:bg-orange-600 transition">
                           Comprar na Shopee
                        </a>
                    </div>
                `;
                vitrine.innerHTML += cartao;
            });
        }

        // Iniciar o carregamento
        carregarVitrine();
    </script>

</body>
</html>
