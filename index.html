<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Vitrine Pro | Shopee</title>
    
    <!-- Dependências Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        /* Estilos personalizados para o Toast e Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            min-width: 250px;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: slideUp 0.3s ease-out forwards, fadeOut 0.3s ease-out 2.7s forwards;
            opacity: 0;
        }
        .toast.success { background-color: #16a34a; }
        .toast.error { background-color: #dc2626; }
        .toast.info { background-color: #ea580c; }
        
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; display: none; } }
    </style>
</head>
<body class="bg-gray-50 pb-24 text-gray-800">

    <!-- Header -->
    <header class="bg-orange-600 text-white shadow-xl sticky top-0 z-50 p-4">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black italic tracking-tighter uppercase">🛍️ Vitrine Pro</h1>
            <input type="text" id="inputBusca" placeholder="O que você procura?" class="w-full md:w-1/2 p-3 rounded-2xl text-gray-800 outline-none focus:ring-2 focus:ring-orange-300 transition-all">
            <div class="text-[10px] bg-orange-700 px-4 py-2 rounded-full font-bold shadow-inner">
                <i class="fas fa-eye mr-2"></i> <span id="count-num">...</span> VISITAS
            </div>
        </div>
    </header>

    <!-- Filtros de Categoria -->
    <div class="max-w-6xl mx-auto px-4 mt-6 flex gap-2 overflow-x-auto no-scrollbar pb-2" id="categoriaContainer">
        <button data-cat="Tudo" class="cat-btn bg-orange-600 text-white px-8 py-2 rounded-full text-xs font-bold whitespace-nowrap shadow-md transition-all">Tudo</button>
        <button data-cat="Eletrônicos" class="cat-btn bg-white border border-gray-200 px-8 py-2 rounded-full text-xs font-bold text-gray-500 whitespace-nowrap hover:bg-orange-50 transition-all">Eletrônicos</button>
        <button data-cat="Moda" class="cat-btn bg-white border border-gray-200 px-8 py-2 rounded-full text-xs font-bold text-gray-500 whitespace-nowrap hover:bg-orange-50 transition-all">Moda</button>
        <button data-cat="Casa" class="cat-btn bg-white border border-gray-200 px-8 py-2 rounded-full text-xs font-bold text-gray-500 whitespace-nowrap hover:bg-orange-50 transition-all">Casa</button>
        <button data-cat="Geek" class="cat-btn bg-white border border-gray-200 px-8 py-2 rounded-full text-xs font-bold text-gray-500 whitespace-nowrap hover:bg-orange-50 transition-all">Geek</button>
        <button data-cat="Diversos" class="cat-btn bg-white border border-gray-200 px-8 py-2 rounded-full text-xs font-bold text-gray-500 whitespace-nowrap hover:bg-orange-50 transition-all">Diversos</button>
    </div>

    <!-- Vitrine de Produtos -->
    <main class="max-w-6xl mx-auto p-4 grid grid-cols-2 md:grid-cols-4 gap-4" id="vitrine">
        <!-- Skeletons Loading (Efeito de Carregamento) -->
        <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 p-3 flex flex-col animate-pulse">
            <div class="w-full h-44 bg-gray-200 rounded-[1.5rem]"></div>
            <div class="h-4 bg-gray-200 rounded mt-4 w-3/4"></div>
            <div class="h-4 bg-gray-200 rounded mt-2 w-1/2"></div>
            <div class="mt-auto pt-3 border-t border-gray-50 mt-3">
                <div class="h-6 bg-gray-200 rounded w-1/3 mb-3"></div>
                <div class="h-10 bg-gray-200 rounded-2xl w-full"></div>
            </div>
        </div>
        <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 p-3 flex flex-col animate-pulse">
            <div class="w-full h-44 bg-gray-200 rounded-[1.5rem]"></div>
            <div class="h-4 bg-gray-200 rounded mt-4 w-3/4"></div>
            <div class="h-4 bg-gray-200 rounded mt-2 w-1/2"></div>
            <div class="mt-auto pt-3 border-t border-gray-50 mt-3">
                <div class="h-6 bg-gray-200 rounded w-1/3 mb-3"></div>
                <div class="h-10 bg-gray-200 rounded-2xl w-full"></div>
            </div>
        </div>
        <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 p-3 flex flex-col animate-pulse hidden md:flex">
            <div class="w-full h-44 bg-gray-200 rounded-[1.5rem]"></div>
            <div class="h-4 bg-gray-200 rounded mt-4 w-3/4"></div>
            <div class="h-4 bg-gray-200 rounded mt-2 w-1/2"></div>
            <div class="mt-auto pt-3 border-t border-gray-50 mt-3">
                <div class="h-6 bg-gray-200 rounded w-1/3 mb-3"></div>
                <div class="h-10 bg-gray-200 rounded-2xl w-full"></div>
            </div>
        </div>
    </main>

    <!-- Modal Admin -->
    <div id="modalAdmin" class="fixed inset-0 bg-black/90 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl max-h-[90vh] overflow-y-auto border-t-8 border-orange-600 text-center relative">
            
            <button id="btnFecharModal" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>

            <!-- Área de Login -->
            <form id="areaLogin" class="space-y-4">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">🔐 Acesso Admin</h2>
                <input type="email" id="emailAdmin" placeholder="E-mail de Admin" required class="w-full p-4 border rounded-2xl text-center outline-none focus:ring-2 focus:ring-orange-500">
                <input type="password" id="senhaAdmin" placeholder="Digite a Senha" required class="w-full p-4 border rounded-2xl text-center outline-none focus:ring-2 focus:ring-orange-500">
                <button type="submit" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold uppercase shadow-xl hover:bg-orange-700 transition active:scale-95">
                    Entrar no Sistema
                </button>
            </form>

            <!-- Área do Painel Administrativo -->
            <div id="areaCadastro" class="hidden space-y-6 text-left">
                <h2 class="text-xl font-bold text-gray-800 text-center border-b pb-3">Painel de Controle</h2>
                
                <div class="bg-orange-50 p-6 rounded-3xl border-2 border-dashed border-orange-200 text-center">
                    <label id="labelCSV" for="inputCSV" class="flex items-center justify-center bg-orange-600 text-white p-4 rounded-2xl font-bold cursor-pointer hover:bg-orange-700 transition shadow-lg text-xs w-full">
                        <i class="fas fa-file-csv mr-2 text-xl"></i> IMPORTAR PLANILHA (CSV)
                    </label>
                    <input type="file" id="inputCSV" accept=".csv" class="hidden">
                    <p class="text-[10px] text-gray-500 mt-2">Certifique-se de que a planilha possui as colunas: nome, preco, imagem, link, categoria.</p>
                </div>

                <form id="formCadastro" class="space-y-3">
                    <p class="text-[10px] font-black text-gray-400 uppercase text-center tracking-widest relative">
                        <span class="bg-white px-2 relative z-10">Ou Cadastro Manual</span>
                        <span class="absolute left-0 top-1/2 w-full h-px bg-gray-200 z-0"></span>
                    </p>
                    <input type="text" id="cadNome" placeholder="Nome do Produto" required class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                    <input type="text" id="cadPreco" placeholder="Preço (ex: R$ 99,90)" required class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                    <input type="url" id="cadImg" placeholder="Link da Foto" required class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                    <input type="url" id="cadLink" placeholder="Seu Link de Afiliado Shopee" required class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                    <select id="cadCat" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500 bg-white">
                        <option value="Eletrônicos">Eletrônicos</option>
                        <option value="Moda">Moda</option>
                        <option value="Casa">Casa</option>
                        <option value="Geek">Geek</option>
                        <option value="Diversos">Diversos</option>
                    </select>
                    <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-xl uppercase hover:bg-green-700 transition active:scale-95">
                        Salvar Produto
                    </button>
                </form>
                <button id="btnLogout" class="w-full text-gray-400 hover:text-red-500 transition text-[12px] font-bold uppercase mt-4 flex justify-center items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> Sair do Painel
                </button>
            </div>
        </div>
    </div>

    <!-- Botões Flutuantes -->
    <button id="btnAbrirAdmin" class="fixed bottom-6 left-6 bg-gray-900 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition z-40">
        <i class="fas fa-cog"></i>
    </button>
    <a href="https://wa.me/5511999999999" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition border-4 border-white z-40">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <!-- Container de Toasts -->
    <div id="toast-container"></div>

    <!-- Lógica da Aplicação -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ==========================================
        // 1. CONFIGURAÇÃO DO FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyC4b0-dfVZeuTXK7ggA9dy1bQAgMphmCj8",
            authDomain: "vitrine-shopee.firebaseapp.com",
            databaseURL: "https://vitrine-shopee-default-rtdb.firebaseio.com",
            projectId: "vitrine-shopee",
            storageBucket: "vitrine-shopee.firebasestorage.app",
            messagingSenderId: "561348400105",
            appId: "1:561348400105:web:4f1713c2f46bbfff5ab178"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const produtosRef = ref(db, 'produtos');
        const statsRef = ref(db, 'stats');

        // Estado Global da Aplicação
        let state = {
            produtos: [],
            categoriaAtual: 'Tudo',
            termoBusca: ''
        };

        // Função Global para Compartilhar (Web Share API)
        window.compartilharProduto = async (nome, link) => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Oferta Incrível!',
                        text: `Olha essa oferta que achei: ${nome}`,
                        url: link
                    });
                } catch (error) {
                    console.log('Compartilhamento cancelado ou falhou:', error);
                }
            } else {
                // Fallback: Se estiver no PC ou navegador não suportado, copia o link
                try {
                    await navigator.clipboard.writeText(`Olha essa oferta: ${nome} - ${link}`);
                    showToast("Link copiado para enviar para os amigos!", "success");
                } catch (err) {
                    // Fallback do fallback
                    const textArea = document.createElement("textarea");
                    textArea.value = link;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    showToast("Link copiado!", "success");
                }
            }
        };

        // ==========================================
        // 2. FUNÇÕES UTILITÁRIAS
        // ==========================================
        
        // Evita injeção de HTML malicioso (XSS)
        function escapeHTML(str) {
            if(typeof str !== 'string') return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        // Sistema elegante de notificações
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==========================================
        // 3. LÓGICA DE INTERFACE E RENDERIZAÇÃO
        // ==========================================
        
        const vitrineEl = document.getElementById('vitrine');

        function atualizarInterface() {
            let filtrados = state.produtos;

            // Aplica filtro de Categoria
            if (state.categoriaAtual !== 'Tudo') {
                filtrados = filtrados.filter(p => p.categoria === state.categoriaAtual);
            }

            // Aplica filtro de Busca
            if (state.termoBusca) {
                const termo = state.termoBusca.toLowerCase();
                filtrados = filtrados.filter(p => p.nome.toLowerCase().includes(termo));
            }

            vitrineEl.innerHTML = '';

            if (filtrados.length === 0) {
                vitrineEl.innerHTML = `<p class='col-span-full text-center py-20 text-gray-500 font-medium'>Nenhuma oferta encontrada para esta busca.</p>`;
                return;
            }

            filtrados.forEach(p => {
                // Utilizando escapeHTML para garantir segurança contra XSS
                const nomeSeguro = escapeHTML(p.nome);
                const precoSeguro = escapeHTML(p.preco);
                // Validando URLs básicas
                const imgSegura = p.imagem.startsWith('http') ? p.imagem : 'https://via.placeholder.com/400?text=Sem+Imagem';
                const linkSeguro = p.link.startsWith('http') ? p.link : '#';

                const cardHTML = `
                    <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 p-3 flex flex-col group overflow-hidden hover:shadow-lg transition-shadow duration-300">
                        <img src="${imgSegura}" alt="${nomeSeguro}" loading="lazy" class="w-full h-44 object-cover rounded-[1.5rem]" onerror="this.src='https://via.placeholder.com/400?text=Erro+na+Imagem'">
                        <h3 class="mt-3 text-sm font-bold text-gray-700 h-10 line-clamp-2" title="${nomeSeguro}">${nomeSeguro}</h3>
                        
                        <div class="mt-auto pt-3 border-t border-gray-50 mt-3 flex items-center justify-between gap-2">
                            <p class="text-xl font-black text-orange-600 flex-1">${precoSeguro}</p>
                            <button onclick="window.compartilharProduto('${nomeSeguro}', '${linkSeguro}')" class="bg-gray-100 text-gray-600 w-10 h-10 rounded-xl flex items-center justify-center hover:bg-orange-100 hover:text-orange-600 transition-colors shadow-sm" title="Compartilhar Oferta">
                                <i class="fas fa-share-nodes"></i>
                            </button>
                        </div>

                        <a href="${linkSeguro}" target="_blank" rel="noopener noreferrer" class="mt-3 block text-center bg-orange-500 text-white py-3 rounded-2xl font-bold uppercase text-[10px] shadow-md hover:bg-orange-600 transition-colors">
                            Ver Oferta <i class="fas fa-external-link-alt ml-1"></i>
                        </a>
                    </div>
                `;
                vitrineEl.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // ==========================================
        // 4. LISTENERS DE EVENTOS (FRONT-END)
        // ==========================================

        // Sistema de Busca
        document.getElementById('inputBusca').addEventListener('input', (e) => {
            state.termoBusca = e.target.value.trim();
            atualizarInterface();
        });

        // Sistema de Categorias
        document.getElementById('categoriaContainer').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                const botoes = document.querySelectorAll('.cat-btn');
                botoes.forEach(btn => {
                    btn.classList.replace('bg-orange-600', 'bg-white');
                    btn.classList.replace('text-white', 'text-gray-500');
                    btn.classList.add('border-gray-200');
                });
                
                e.target.classList.replace('bg-white', 'bg-orange-600');
                e.target.classList.replace('text-gray-500', 'text-white');
                e.target.classList.remove('border-gray-200');

                state.categoriaAtual = e.target.getAttribute('data-cat');
                atualizarInterface();
            }
        });

        // Controle do Modal
        const modalAdmin = document.getElementById('modalAdmin');
        document.getElementById('btnAbrirAdmin').addEventListener('click', () => {
            modalAdmin.classList.remove('hidden');
        });
        document.getElementById('btnFecharModal').addEventListener('click', () => {
            modalAdmin.classList.add('hidden');
        });

        // ==========================================
        // 5. INTEGRAÇÃO FIREBASE (REALTIME & AUTH)
        // ==========================================

        // Incrementar Visitas com segurança
        try {
            update(statsRef, { visitas: increment(1) });
        } catch(e) {
            console.error("Erro ao computar visita", e);
        }

        // Escutar contador de visitas
        onValue(ref(db, 'stats/visitas'), (snapshot) => {
            document.getElementById('count-num').innerText = snapshot.val() || 0;
        });

        // Escutar Produtos
        onValue(produtosRef, (snapshot) => {
            const data = snapshot.val();
            state.produtos = data ? Object.entries(data).map(([id, info]) => ({id, ...info})) : [];
            // Inverter para mostrar os mais recentes primeiro
            state.produtos.reverse(); 
            atualizarInterface();
        }, (error) => {
            console.error("Erro ao buscar produtos:", error);
            vitrineEl.innerHTML = `<p class='col-span-full text-center py-20 text-red-500'>Erro ao carregar a vitrine. Verifique sua conexão.</p>`;
        });

        // Autenticação Observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('areaLogin').classList.add('hidden');
                document.getElementById('areaCadastro').classList.remove('hidden');
            } else {
                document.getElementById('areaLogin').classList.remove('hidden');
                document.getElementById('areaCadastro').classList.add('hidden');
            }
        });

        // Login Admin
        document.getElementById('areaLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailAdmin').value.trim();
            const senha = document.getElementById('senhaAdmin').value.trim();
            const btn = e.target.querySelector('button');
            
            try {
                btn.innerText = 'Autenticando...';
                btn.disabled = true;
                await signInWithEmailAndPassword(auth, email, senha);
                showToast("Login realizado com sucesso!", "success");
                document.getElementById('formCadastro').reset();
            } catch (error) {
                showToast("Acesso Negado. E-mail ou senha incorretos.", "error");
                console.error(error);
            } finally {
                btn.innerText = 'Entrar no Sistema';
                btn.disabled = false;
            }
        });

        // Logout
        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth).then(() => {
                showToast("Sessão encerrada.", "info");
                modalAdmin.classList.add('hidden');
            });
        });

        // ==========================================
        // 6. CADASTRO DE DADOS (ADMIN)
        // ==========================================

        // Cadastro Manual
        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            btn.innerText = 'Salvando...';
            btn.disabled = true;

            const dados = {
                nome: document.getElementById('cadNome').value.trim(),
                preco: document.getElementById('cadPreco').value.trim(),
                imagem: document.getElementById('cadImg').value.trim(),
                link: document.getElementById('cadLink').value.trim(),
                categoria: document.getElementById('cadCat').value
            };

            try {
                await push(produtosRef, dados);
                showToast("Produto salvo com sucesso!", "success");
                e.target.reset();
                document.getElementById('cadNome').focus();
            } catch (error) {
                showToast("Erro ao salvar! Você tem permissão?", "error");
                console.error(error);
            } finally {
                btn.innerText = 'Salvar Produto';
                btn.disabled = false;
            }
        });

        // Importação via CSV
        document.getElementById('inputCSV').addEventListener('change', function(event) {
            const file = event.target.files[0];
            const label = document.getElementById('labelCSV');
            if (!file) return;

            label.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> PROCESSANDO...';
            
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async function(results) {
                    let adicionados = 0;
                    for (const prod of results.data) {
                        if(prod.nome && prod.preco) {
                            try {
                                await push(produtosRef, {
                                    nome: prod.nome.trim(),
                                    preco: prod.preco.trim(),
                                    imagem: prod.imagem ? prod.imagem.trim() : "",
                                    link: prod.link ? prod.link.trim() : "#",
                                    categoria: prod.categoria ? prod.categoria.trim() : "Diversos"
                                });
                                adicionados++;
                            } catch(e) {
                                console.error("Erro linha CSV", e);
                            }
                        }
                    }
                    showToast(`${adicionados} produtos importados com sucesso!`, "success");
                    label.innerHTML = '<i class="fas fa-file-csv mr-2 text-xl"></i> IMPORTAR PLANILHA (CSV)';
                    event.target.value = ''; // Reseta o input
                },
                error: function(err) {
                    showToast("Erro ao ler o arquivo CSV.", "error");
                    label.innerHTML = '<i class="fas fa-file-csv mr-2 text-xl"></i> IMPORTAR PLANILHA (CSV)';
                }
            });
        });
    </script>
</body>
</html>
