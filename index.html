<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Vitrine Pro | Shopee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4b0-dfVZeuTXK7ggA9dy1bQAgMphmCj8",
            authDomain: "vitrine-shopee.firebaseapp.com",
            databaseURL: "https://vitrine-shopee-default-rtdb.firebaseio.com",
            projectId: "vitrine-shopee",
            storageBucket: "vitrine-shopee.firebasestorage.app",
            messagingSenderId: "561348400105",
            appId: "1:561348400105:web:4f1713c2f46bbfff5ab178"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const produtosRef = ref(db, 'produtos'); // Pasta da SUA loja

        // SEGURANÇA (Senha: admin2024 - você pode alterar)
        const CHAVE_MESTRA = "4813494d137e1631bba301d5acab6e7bb7aa74ce1185d456565ef51d737677b2";
        async function hashSenha(s){const utf8=new TextEncoder().encode(s);const hashBuffer=await crypto.subtle.digest('SHA-256',utf8);const hashArray=Array.from(new Uint8Array(hashBuffer));return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');}

        window.fazerLogin = async () => {
            const h = await hashSenha(document.getElementById('senhaAdmin').value);
            if(h === 280320){ sessionStorage.setItem('auth_minhaloja','true'); mostrarCadastro(); }
            else alert("Acesso Negado!");
        };

        // --- BOT DE IMPORTAÇÃO (CSV) ---
        window.importarCSV = function(event) {
            const file = event.target.files[0];
            const btnLabel = document.getElementById('labelCSV');
            if (!file) return;

            btnLabel.innerText = "⏳ IMPORTANDO...";
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    results.data.forEach(prod => {
                        if(prod.nome && prod.preco) {
                            push(produtosRef, {
                                nome: prod.nome,
                                preco: prod.preco,
                                imagem: prod.imagem,
                                link: prod.link || "#",
                                categoria: prod.categoria || "Geral"
                            });
                        }
                    });
                    alert("Importação concluída com sucesso!");
                    btnLabel.innerText = "📁 IMPORTAR PLANILHA (CSV)";
                }
            });
        };

        // CARREGAMENTO
        update(ref(db, 'stats'), { visitas: increment(1) });
        onValue(ref(db, 'stats/visitas'), (s) => document.getElementById('count-num').innerText = s.val() || 0);
        onValue(produtosRef, (s) => {
            const data = s.val();
            window.produtosBD = data ? Object.entries(data).map(([id, info]) => ({id, ...info})) : [];
            renderizar(window.produtosBD);
        });

        window.salvarNoFirebase = function() {
            const dados = {
                nome: document.getElementById('cadNome').value,
                preco: document.getElementById('cadPreco').value,
                imagem: document.getElementById('cadImg').value,
                link: document.getElementById('cadLink').value,
                categoria: document.getElementById('cadCat').value
            };
            push(produtosRef, dados).then(() => {
                alert("Salvo!");
                document.getElementById('formCadastro').reset();
            });
        };
    </script>
</head>
<body class="bg-gray-50 pb-24 text-gray-800">

    <header class="bg-orange-600 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter">🛍️ VITRINE VIP</h1>
            <div class="text-[10px] bg-orange-700 px-3 py-1 rounded-full font-bold">
                <i class="fas fa-eye mr-1"></i> <span id="count-num">0</span> VISITAS
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-2 md:grid-cols-4 gap-4" id="vitrine"></main>

    <div id="modalAdmin" class="fixed inset-0 bg-black/90 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div id="areaLogin">
                <h2 class="text-2xl font-bold mb-6 text-center">🔐 Painel de Controle</h2>
                <input type="password" id="senhaAdmin" placeholder="Senha do Admin" class="w-full p-4 border rounded-2xl mb-4 text-center outline-none focus:ring-2 focus:ring-orange-500">
                <button onclick="fazerLogin()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold uppercase shadow-lg">Entrar</button>
                <button onclick="fecharAdmin()" class="w-full mt-2 text-gray-400">Cancelar</button>
            </div>

            <div id="areaCadastro" class="hidden space-y-6">
                <div class="bg-orange-50 p-5 rounded-3xl border-2 border-dashed border-orange-200">
                    <h3 class="text-xs font-black text-orange-600 uppercase mb-3 text-center">Importação em Massa</h3>
                    <label id="labelCSV" for="inputCSV" class="flex items-center justify-center bg-orange-600 text-white p-4 rounded-2xl font-bold cursor-pointer hover:bg-orange-700 transition shadow-md">
                        <i class="fas fa-file-csv mr-2 text-xl"></i> SUBIR PLANILHA (CSV)
                    </label>
                    <input type="file" id="inputCSV" accept=".csv" class="hidden" onchange="importarCSV(event)">
                </div>

                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-100"></div>
                    <span class="flex-shrink mx-4 text-gray-300 text-[10px] font-bold uppercase">ou individual</span>
                    <div class="flex-grow border-t border-gray-100"></div>
                </div>

                <form id="formCadastro" onsubmit="event.preventDefault(); salvarNoFirebase();" class="space-y-3">
                    <input type="text" id="cadNome" placeholder="Nome do Produto" required class="w-full p-3 border rounded-xl outline-none">
                    <input type="text" id="cadPreco" placeholder="Preço (R$)" required class="w-full p-3 border rounded-xl outline-none">
                    <input type="text" id="cadImg" placeholder="Link da Foto" required class="w-full p-3 border rounded-xl outline-none">
                    <input type="text" id="cadLink" placeholder="Link da Shopee" required class="w-full p-3 border rounded-xl outline-none">
                    <select id="cadCat" class="w-full p-3 border rounded-xl outline-none bg-white">
                        <option value="Eletrónicos">Eletrónicos</option>
                        <option value="Moda">Moda</option>
                        <option value="Casa">Casa</option>
                    </select>
                    <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg uppercase">Salvar Agora</button>
                </form>
                <button onclick="logoutAdmin()" class="w-full text-gray-400 text-xs font-bold uppercase">Sair</button>
            </div>
        </div>
    </div>

    <button onclick="abrirAdmin()" class="fixed bottom-6 left-6 bg-gray-900/50 text-white p-4 rounded-full shadow-lg backdrop-blur-sm"><i class="fas fa-cog"></i></button>
    <a href="https://wa.me/SEUNUMERO" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition"><i class="fab fa-whatsapp text-3xl"></i></a>

    <script>
        function renderizar(lista) {
            const v = document.getElementById('vitrine');
            v.innerHTML = "";
            lista.forEach(p => {
                v.innerHTML += `
                    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-3 flex flex-col group">
                        <div class="overflow-hidden rounded-2xl">
                            <img src="${p.imagem}" class="w-full h-44 object-cover group-hover:scale-110 transition duration-500" onerror="this.src='https://via.placeholder.com/400'">
                        </div>
                        <h3 class="mt-3 text-sm font-bold text-gray-700 h-10 line-clamp-2">${p.nome}</h3>
                        <div class="mt-auto pt-3">
                            <p class="text-xl font-black text-orange-600">${p.preco}</p>
                            <a href="${p.link}" target="_blank" class="mt-3 block bg-orange-500 text-white text-center py-3 rounded-2xl font-bold uppercase text-[10px] shadow-md hover:bg-orange-600 transition">Ver Oferta</a>
                        </div>
                    </div>`;
            });
        }
        window.abrirAdmin = () => { document.getElementById('modalAdmin').classList.remove('hidden'); if(sessionStorage.getItem('auth_minhaloja')) mostrarCadastro(); };
        window.fecharAdmin = () => document.getElementById('modalAdmin').classList.add('hidden');
        function mostrarCadastro() { document.getElementById('areaLogin').classList.add('hidden'); document.getElementById('areaCadastro').classList.remove('hidden'); }
        window.logoutAdmin = () => { sessionStorage.removeItem('auth_minhaloja'); location.reload(); };
    </script>
</body>
</html>
